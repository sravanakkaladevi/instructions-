<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instruction Guides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#101827",
              muted: "#64748b",
              line: "#dbeafe",
              wash: "#eff6ff",
              brand: "#2563eb",
              brandSoft: "#dbeafe"
            },
            boxShadow: {
              soft: "0 22px 60px rgba(15, 23, 42, 0.12)",
              glow: "0 18px 48px rgba(37, 99, 235, 0.22)"
            }
          }
        }
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        background:
          radial-gradient(circle at 18% 12%, rgba(56, 189, 248, 0.18), transparent 30%),
          radial-gradient(circle at 88% 8%, rgba(37, 99, 235, 0.14), transparent 26%),
          linear-gradient(135deg, #f8fbff 0%, #eef5ff 42%, #f9fbff 100%);
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(18px);
      }

      .uiverse-button {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border-radius: 10px;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .uiverse-button::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        opacity: 0;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(20, 184, 166, 0.95));
        transition: opacity 180ms ease;
      }

      .uiverse-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 28px rgba(37, 99, 235, 0.18);
      }

      .uiverse-button:hover::before {
        opacity: 1;
      }

      .uiverse-button:hover span,
      .uiverse-button:hover {
        color: #ffffff;
      }

      .hero-card {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(239, 246, 255, 0.86)),
          linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(20, 184, 166, 0.1));
      }

      .command-block {
        position: relative;
        overflow: hidden;
        box-shadow: 0 16px 32px rgba(2, 6, 23, 0.14);
      }

      .command-block::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.75), rgba(45, 212, 191, 0.5), rgba(148, 163, 184, 0.25));
        mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        mask-composite: exclude;
        pointer-events: none;
      }

      .command-action {
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease;
      }

      .command-action:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body class="text-ink antialiased">
    <div class="min-h-screen lg:grid lg:grid-cols-[310px_1fr]">
      <aside class="glass-panel border-b border-white/70 lg:sticky lg:top-0 lg:h-screen lg:border-b-0 lg:border-r">
        <div class="flex items-center justify-between gap-4 border-b border-white/70 px-5 py-4">
          <a href="#" class="flex items-center gap-3" aria-label="Instruction Guides home">
            <span class="grid h-11 w-11 place-items-center rounded-xl bg-gradient-to-br from-brand to-teal-500 text-sm font-black text-white shadow-glow">IG</span>
            <span>
              <span class="block text-base font-black">Instruction Guides</span>
              <span class="block text-xs font-bold text-muted">HTML Tailwind JS</span>
            </span>
          </a>
          <button id="menuToggle" class="uiverse-button border border-blue-200 bg-white px-3 py-2 text-sm font-bold text-ink lg:hidden">
            Menu
          </button>
        </div>

        <div id="sidebarBody" class="hidden px-4 py-5 lg:block">
          <label for="searchInput" class="mb-2 block text-xs font-black uppercase text-muted">Search guide</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Search commands or topics"
            class="mb-5 w-full rounded-xl border border-blue-100 bg-white/85 px-3 py-3 text-sm font-medium shadow-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-brandSoft"
          />

          <nav aria-label="Guide topics">
            <p class="mb-3 text-xs font-black uppercase text-muted">Instructions</p>
            <div id="guideList" class="space-y-2"></div>
          </nav>
        </div>
      </aside>

      <main class="px-4 py-6 sm:px-6 lg:px-10 lg:py-8">
        <section class="hero-card mb-6 rounded-2xl border border-white/80 p-5 shadow-soft sm:p-7">
          <div class="mx-auto max-w-5xl">
            <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
              <div>
                <h1 class="text-3xl font-black tracking-normal text-ink sm:text-4xl">Development Instruction Guides</h1>
                <p class="mt-3 max-w-2xl text-base leading-7 text-muted">
                  Separate guides for virtual environment setup, Git, GitHub push, and Django commands.
                </p>
              </div>
              <div class="flex flex-wrap gap-2">
                <button id="printButton" class="uiverse-button bg-gradient-to-r from-slate-950 to-slate-700 px-4 py-2.5 text-sm font-black text-white">
                  Print
                </button>
                <button id="copyAllButton" class="uiverse-button border border-blue-200 bg-white px-4 py-2.5 text-sm font-black text-ink">
                  Copy Guide
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="mx-auto max-w-5xl">
          <div id="guideMeta" class="mb-4 flex flex-wrap gap-2"></div>
          <article id="guideContent" class="glass-panel rounded-2xl border border-white/80 p-5 shadow-soft sm:p-7"></article>
        </section>
      </main>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 hidden -translate-x-1/2 rounded-xl bg-slate-950 px-4 py-2 text-sm font-bold text-white shadow-soft">
      Copied
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
